version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: geosurepath-db
    restart: always
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: securepass
    volumes:
      - ../database/data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    networks:
      - geosurepath-network

  redis:
    image: redis:7-alpine
    container_name: geosurepath-cache
    restart: always
    networks:
      - geosurepath-network

  traccar:
    image: traccar/traccar:latest
    container_name: geosurepath-traccar
    restart: always
    depends_on:
      - postgres
    ports:
      - "8082:8082"
      - "5023:5023"
      - "5000-5150:5000-5150"
      - "5000-5150:5000-5150/udp"
    volumes:
      - ../traccar/traccar.xml:/opt/traccar/conf/traccar.xml
      - ../traccar/logs:/opt/traccar/logs
    networks:
      - geosurepath-network

  backend:
    build: ../backend
    container_name: geosurepath-backend
    restart: always
    environment:
      DATABASE_URL: postgres://traccar:securepass@postgres:5432/traccar
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      TRACCAR_INTERNAL_URL: http://traccar:8082
    depends_on:
      - postgres
      - redis
      - traccar
    networks:
      - geosurepath-network

  frontend:
    build: ../frontend
    container_name: geosurepath-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SOCKET_URL: /socket.io
    depends_on:
      - backend
    networks:
      - geosurepath-network

  nginx:
    image: nginx:alpine
    container_name: geosurepath-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - geosurepath-network

networks:
  geosurepath-network:
    driver: bridge

volumes:
  database_data:
