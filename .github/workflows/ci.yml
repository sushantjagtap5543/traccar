name: GeoSurePath Enterprise CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-admin-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: geosurepath-admin-api/package-lock.json
      - name: Install dependencies
        run: |
          cd geosurepath-admin-api
          npm ci
      - name: Run Tests
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY || 'test_key_32chars_minimum_here_must_be_long' }}
        run: |
          cd geosurepath-admin-api
          npm test

  test-frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: GeoSurePath/package-lock.json
      - name: Install dependencies
        run: |
          cd GeoSurePath
          npm ci
      - name: Install Playwright Browsers
        run: |
          cd GeoSurePath
          npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          cd GeoSurePath
          npx playwright test
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: GeoSurePath/playwright-report/
          retention-days: 30

  build-and-push:
    needs: [test-admin-api, test-frontend-e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Admin API
        uses: docker/build-push-action@v4
        with:
          context: ./geosurepath-admin-api
          push: true
          tags: geosurepath/admin-api:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./GeoSurePath
          push: true
          tags: geosurepath/frontend:latest
