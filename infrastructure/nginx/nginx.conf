worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend API Upstream
    upstream backend_api {
        server backend: 3001;
    }

    # Frontend Upstream
    upstream frontend_ui {
        server frontend: 3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirect all HTTP requests to HTTPS (Optional - enabled if SSL is present)
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://frontend_ui;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /traccar/ws {
            proxy_pass http://traccar:8082/api/socket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }

    # HTTPS Server (Uncomment and configure once SSL certs are added to /etc/nginx/ssl)
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://frontend_ui;
    #         ...
    #     }
    # }
}
