version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: traccar-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-traccar}
      POSTGRES_USER: ${DB_USER:-traccar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-traccar}
    volumes:
      - traccar_db_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - traccar-network

  redis:
    image: redis:7-alpine
    container_name: traccar-redis
    restart: always
    networks:
      - traccar-network

  traccar:
    image: traccar/traccar:latest
    container_name: traccar-core
    restart: always
    volumes:
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ./traccar/logs:/opt/traccar/logs
    ports:
      - "5000-5150:5000-5150"
      - "5150:5150/udp"
    depends_on:
      - database
    networks:
      - traccar-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traccar-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - database
      - redis
      - traccar
    networks:
      - traccar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traccar-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      - backend
    networks:
      - traccar-network

  nginx:
    image: nginx:alpine
    container_name: traccar-nginx
    restart: always
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - traccar-network

networks:
  traccar-network:
    driver: bridge

volumes:
  traccar_db_data:
