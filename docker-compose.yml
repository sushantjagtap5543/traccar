version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: traccar-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: traccar-backend
    restart: always
    environment:
      TRACCAR_ADMIN_USER: ${TRACCAR_ADMIN_USER}
      TRACCAR_ADMIN_PASS: ${TRACCAR_ADMIN_PASS}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      - postgres
    ports:
      - "${SERVER_PORT}:8082"

  frontend:
    build: ./frontend
    container_name: traccar-frontend
    restart: always
    ports:
      - "3000:80"

  nginx:
    image: nginx:latest
    container_name: traccar-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
