version: '3.8'

services:
  traccar:
    image: traccar/traccar:latest
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
    volumes:
      - ./traccar.xml:/opt/traccar/conf/traccar.xml:ro
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traccar
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-api:
    build: ./geosurepath-admin-api
    ports:
      - "8083:8083"
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/traccar
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./geosurepath-admin-api/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./GeoSurePath
    ports:
      - "3000:3000"
    environment:
      - VITE_ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - admin-api

volumes:
  postgres_data:
