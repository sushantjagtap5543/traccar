version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: traccar-db
    restart: always
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: traccar_secure_password
    volumes:
      - ./database:/var/lib/postgresql/data
    networks:
      - gps-network

  traccar:
    image: traccar/traccar:6.7
    container_name: traccar-server
    restart: always
    depends_on:
      - postgres
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
      - "5000-5150:5000-5150/udp"
    volumes:
      - ./traccar/conf/traccar.xml:/opt/traccar/conf/traccar.xml
      - ./traccar/data:/opt/traccar/data
      - ./traccar/logs:/opt/traccar/logs
    networks:
      - gps-network

  nginx:
    image: nginx:latest
    container_name: gps-nginx
    restart: always
    depends_on:
      - traccar
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - gps-network

networks:
  gps-network:
    driver: bridge
