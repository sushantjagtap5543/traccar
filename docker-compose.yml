services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=traccar
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/api_key.txt:/etc/prometheus/api_key.txt:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    depends_on:
      admin-api:
        condition: service_healthy

  traccar:
    image: traccar/traccar:latest
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./traccar.xml.template:/app/traccar.xml.template:ro
      - ./entrypoint.sh:/app/entrypoint.sh:ro
    entrypoint: [ "/bin/sh", "/app/entrypoint.sh" ]
    command: [ "java", "-Xms512m", "-Xmx512m", "-jar", "tracker-server.jar", "/app/traccar.xml" ]
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
      - "5000-5150:5000-5150/udp"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/api/server" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - internal

  admin-api:
    build:
      context: ./geosurepath-admin-api
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./geosurepath-admin-api/logs:/app/logs
      - ./backups:/app/backups
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/traccar
      - REDIS_URL=redis://redis:6379
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    networks:
      - internal

  frontend:
    build:
      context: ./GeoSurePath
      args:
        - VITE_API_URL=/api
        - VITE_ADMIN_API_URL=/api/admin
        - VITE_ADMIN_API_KEY=${ADMIN_API_KEY}
        - VITE_RAZORPAY_KEY=${RAZORPAY_KEY_ID}
    environment:
      - VITE_ADMIN_API_KEY=${ADMIN_API_KEY}
      - VITE_ADMIN_API_URL=/api/admin
      - VITE_RAZORPAY_KEY=${RAZORPAY_KEY_ID}
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      frontend:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      traccar:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    networks:
      - internal
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  grafana:
    image: grafana/grafana-oss:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    depends_on:
      - prometheus

networks:
  internal:
    driver: bridge

volumes:
  db_data:
  redis_data:
  grafana_data:
  prometheus_data:
  certbot-etc:
  certbot-var:
  webroot:
