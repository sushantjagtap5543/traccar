version: "3"

services:
  traccar:
    image: traccar/traccar:latest
    container_name: traccar-core
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
    volumes:
      - ./traccar/data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    networks:
      - traccar-network

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-traccar}
      POSTGRES_USER: ${DB_USER:-traccar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-traccar}
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    networks:
      - traccar-network

  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - traccar-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    networks:
      - traccar-network

networks:
  traccar-network:
    driver: bridge
