services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=traccar
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  traccar:
    image: traccar/traccar:latest
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./traccar.xml.template:/app/traccar.xml.template
      - ./entrypoint.sh:/app/entrypoint.sh
    entrypoint: [ "/bin/sh", "/app/entrypoint.sh" ]
    command: [ "java", "-Xms512m", "-Xmx512m", "-jar", "tracker-server.jar", "/app/traccar.xml" ]
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
      - "5000-5150:5000-5150/udp"

  admin-api:
    build:
      context: ./geosurepath-admin-api
    restart: always
    env_file: .env
    ports:
      - "8083:8083"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./geosurepath-admin-api/logs:/app/logs
      - ./backups:/app/backups
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/traccar

  frontend:
    build:
      context: ./GeoSurePath
    ports:
      - "3000:3000"
    environment:
      - VITE_ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - admin-api

  grafana:
    image: grafana/grafana-oss:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${DB_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - admin-api

volumes:
  grafana_data:
