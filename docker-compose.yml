version: "3.8"

services:

  database:
    image: postgres:15
    container_name: traccar_db
    restart: always
    environment:
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: traccar
      POSTGRES_DB: traccar
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  traccar:
    build: .
    container_name: traccar_server
    restart: always
    depends_on:
      - database
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150"
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://database:5432/traccar
      DATABASE_USER: traccar
      DATABASE_PASSWORD: traccar
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8082"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: traccar_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - traccar

volumes:
  db_data:
