<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a237e" />
  <meta name="description" content="GeoSurePath GPS Tracking System" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <title>GeoSurePath | Premium GPS Tracking</title>
  <style>
    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: sans-serif;
    }

    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .loader-logo {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-right-color: #0F2D5C;
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      to {
        transform: rotate(1turn);
      }
    }
  </style>
</head>

<body>
  <noscript>Enable JavaScript to use <a href="/">GeoSurePath</a>.</noscript>
  <div id="root" class="root"></div>
  <div class="initial-loader" id="preloader">
    <img src="/logo.svg" class="loader-logo" alt="GeoSurePath">
    <div class="spinner"></div>
  </div>
  <script type="module" src="/src/index.jsx" onerror="alert('Loading error.')"></script>
</body>

</html>
