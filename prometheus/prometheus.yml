global:
  scrape_interval: 15s
scrape_configs:
  - job_name: geosurepath
    static_configs:
      - targets: [admin-api:8083]
    metrics_path: /metrics
    # Auth for protected metrics endpoint
    http_sd_configs: []
    # Using basic static auth via headers
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/api_key.txt
