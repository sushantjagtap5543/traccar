version: '3.8'

services:
  traccar:
    image: traccar/traccar:5.8
    container_name: traccar
    restart: always
    ports:
      - "8082:8082"
      - "5000-5100:5000-5100/udp" # device protocols
    volumes:
      - ./backend/src:/opt/traccar/conf
      - ./logs:/opt/traccar/logs
    environment:
      - TZ=Asia/Kolkata

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: StrongPassword123
    volumes:
      - ./database:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx/ssl:/etc/ssl
