events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream frontend {
        server geosurepath:80;
    }

    upstream admin_api {
        server admin-api:8083;
    }

    upstream traccar_api {
        server traccar:8082;
    }

    # Redirect HTTP to HTTPS (simplified for now, using port 80 for proxying)
    server {
        listen 80;
        server_name localhost;

        # Static Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin API
        location /api/admin/ {
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Traccar Core API
        location /api/ {
            proxy_pass http://traccar_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus / Metrics (internal access normally, but exposing for ease if needed)
        location /metrics {
            proxy_pass http://admin_api/metrics;
            proxy_set_header Host $host;
        }
    }
}
